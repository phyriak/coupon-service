databaseChangeLog:
  - changeSet:
      id: 002-create-coupon-usages
      author: dev
      changes:
        - createTable:
            tableName: coupon_usages
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: coupon_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_coupon_usages_coupon
                    references: coupons(id)
              - column:
                  name: user_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: coupon_usages
            columnNames: coupon_id, user_id
            constraintName: uq_coupon_usages_coupon_user

        - createIndex:
            tableName: coupon_usages
            indexName: idx_coupon_usages_coupon_user
            columns:
              - column:
                  name: coupon_id
              - column:
                  name: user_id
