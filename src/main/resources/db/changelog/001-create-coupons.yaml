databaseChangeLog:
  - changeSet:
      id: 001-create-coupons
      author: dev
      changes:
        - createTable:
            tableName: coupons
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: usage_limit
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: usage_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: country
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: coupons
            columnNames: code
            constraintName: uq_coupons_code

        - createIndex:
            tableName: coupons
            indexName: idx_coupons_code
            columns:
              - column:
                  name: code
