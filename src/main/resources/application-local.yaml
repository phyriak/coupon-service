server:
  port: 8090

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/coupon_db}
    username: ${DB_USERNAME:coupon_user}
    password: ${DB_PASSWORD:coupon_pass}
  jpa:
    properties:
      hibernate:
        format_sql: true
    show-sql: true

logging:
  level:
    com.example.coupon: DEBUG
    org.hibernate.SQL: DEBUG