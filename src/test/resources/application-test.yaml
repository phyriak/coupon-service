spring:
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml


geolocation:
  ip-api:
    connect-timeout: 500ms
    read-timeout: 500ms

resilience4j:
  retry:
    instances:
      geoLocation:
        max-attempts: 3
        wait-duration: 1ms
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException